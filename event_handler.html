<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event handler</title>
</head>
<body>
    <h1 id="page-title">Event handler</h1>
    <button id="btn-update-title">update file</button>
    
    
    <p id="user-info">No user</p>
    <button id="btn-login">login</button>
<br><br>


    <!-- handle input text -->
     <p id="name">No name</p>
     <input id="input-name" placeholder="Your name" type="text">
     <button id="btn-update">update</button>

     <!-- handle input text 2 -->

      <p id="shila">sibling</p>
      <input id="name-input" placeholder="your name" type="text">
      <button id="btn-name">name</button>

    <script>
        // find button then add event listener
document.getElementById('btn-update').addEventListener('click',function(){
    // find input
    const inputName=document.getElementById('input-name');
    // get value
    const name=inputName.value;
    // find output
    const noName=document.getElementById('name');
    // set output
    noName.innerText=name;
})





       document.getElementById('btn-name').addEventListener('click',function(){
        const inputName=document.getElementById('name-input');
        const shila=inputName.value;
        const nameP=document.getElementById('shila');
        nameP.innerText=shila;
       })

        

    
    </script>
    <script src="js/handler.js"></script>
</body>
</html>
